<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20viewBox%3D%270%200%2064%2064%27%3E%3Crect%20width%3D%2764%27%20height%3D%2764%27%20rx%3D%2732%27%20fill%3D%27%23F8F6EF%27/%3E%3Ccircle%20cx%3D%2732%27%20cy%3D%2732%27%20r%3D%2724%27%20fill%3D%27none%27%20stroke%3D%27%237A2530%27%20stroke-width%3D%273%27/%3E%3Ctext%20x%3D%2732%27%20y%3D%2737%27%20font-family%3D%27Space%20Grotesk%2C%20Arial%2C%20sans-serif%27%20font-size%3D%2715%27%20font-weight%3D%27700%27%20text-anchor%3D%27middle%27%20fill%3D%27%237A2530%27%3ECBH%3C/text%3E%3C/svg%3E">
<title>Carolina | CBH Closes — High-Ticket Remote Closer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,9..144,500&family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#2E241F;
    --ink-2:#3B2E27;
    --paper:#F8F6EF;
    --paper-dim:#EFEAE0;
    --accent:#7A2530;
    --accent-bright:#9E3648;
    --stamp:#3B2E27;
    --slate:#6B5D52;
    --line: rgba(46,36,31,0.16);
    --display: 'Space Grotesk', sans-serif;
    --body: 'IBM Plex Sans', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{background:var(--paper); color:var(--ink); font-family:var(--body); line-height:1.5; overflow-x:hidden;}
  a{color:inherit; text-decoration:none;}
  img{max-width:100%; display:block;}
  .wrap{max-width:1120px; margin:0 auto; padding:0 32px;}
  ::selection{background:var(--accent); color:var(--ink);}
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important; scroll-behavior:auto !important;}
  }

  /* ---------- NAV ---------- */
  header{position:fixed; top:0; left:0; right:0; z-index:50; background:rgba(248,246,239,0.92); backdrop-filter:blur(8px); border-bottom:1px solid var(--line);}
  nav.wrap{display:flex; align-items:center; justify-content:space-between; height:76px;}
  .brand{font-family:var(--display); font-weight:600; font-size:1.15rem; display:flex; align-items:center; gap:10px;}
  .brand .mark{width:32px;height:32px;border:1.5px solid var(--accent); border-radius:50%; display:flex;align-items:center;justify-content:center; font-family:var(--display); font-weight:700; font-size:0.5rem; letter-spacing:-0.02em; color:var(--accent);}
  .navlinks{display:flex; gap:36px; font-size:0.92rem; color:var(--slate);}
  .navlinks a:hover{color:var(--accent-bright);}
  .nav-cta{font-family:var(--mono); font-size:0.8rem; border:1px solid var(--accent); color:var(--accent-bright); padding:9px 18px; border-radius:2px; transition:background .2s ease, color .2s ease;}
  .nav-cta:hover{background:var(--accent); color:var(--paper);}
  @media (max-width:840px){ .navlinks{display:none;} }

  /* ---------- HERO ---------- */
  .hero{position:relative; padding:140px 0 60px; background:radial-gradient(ellipse at 15% 0%, rgba(122,37,48,0.08), transparent 55%), var(--paper); overflow:hidden;}
  .hero::before{content:""; position:absolute; inset:0; background-image:repeating-linear-gradient(0deg, rgba(46,36,31,0.035) 0px, rgba(46,36,31,0.035) 1px, transparent 1px, transparent 42px); pointer-events:none;}
  .hero-grid{display:grid; grid-template-columns:1.2fr 0.9fr; gap:44px; align-items:center; position:relative; z-index:1;}
  @media (max-width:800px){ .hero-grid{grid-template-columns:1fr; gap:32px;} .hero-grid .photo-frame{max-width:340px; margin:0 auto;} }
  .eyebrow{font-family:var(--mono); font-size:0.78rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--accent); display:flex; align-items:center; gap:10px; margin-bottom:18px;}
  .eyebrow::before{content:"§"; color:var(--stamp);}
  .hero-tag{font-family:var(--display); font-weight:700; font-size:clamp(1.1rem, 2.4vw, 1.5rem); letter-spacing:0.005em; color:var(--accent); display:flex; align-items:center; gap:10px; margin-bottom:20px;}
  .name-display{font-family:var(--display); font-weight:700; text-transform:uppercase; font-size:clamp(2.8rem, 7.2vw, 4.8rem); line-height:0.94; letter-spacing:-0.01em; margin-bottom:18px; color:var(--ink);}
  h1{font-family:'Fraunces', serif; font-style:italic; font-weight:500; font-size:clamp(1.3rem, 2.4vw, 1.75rem); line-height:1.3; letter-spacing:-0.005em; margin-bottom:20px; color:var(--ink); max-width:42ch;}
  h1 em{font-style:italic; font-weight:600; color:var(--accent);}
  .hero p.lede{font-size:1.08rem; color:var(--slate); max-width:48ch; margin-bottom:34px;}
  .hero-actions{display:flex; gap:16px; flex-wrap:wrap; align-items:center;}
  .btn-primary{font-family:var(--mono); font-size:0.85rem; letter-spacing:0.02em; background:var(--accent); color:var(--paper); font-weight:600; padding:15px 26px; border-radius:2px; transition:transform .18s ease, background .18s ease; display:inline-block;}
  .btn-primary:hover{background:var(--accent-bright); transform:translateY(-1px);}
  .btn-ghost{font-family:var(--mono); font-size:0.85rem; color:var(--ink); padding:15px 8px; border-bottom:1px solid var(--slate);}
  .btn-ghost:hover{border-color:var(--accent-bright); color:var(--accent-bright);}

  /* photo frame */
  .photo-frame{
    position:relative; aspect-ratio:4/5; border:1px solid var(--line); border-radius:3px;
    background:var(--paper-dim); display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }
  .photo-frame img{width:100%; height:100%; object-fit:cover;}
  .photo-frame .placeholder-text{
    font-family:var(--mono); font-size:0.75rem; color:#6b5d52; text-align:center; padding:20px; letter-spacing:0.04em;
  }
  .photo-frame::after{
    content:"CLOSED"; position:absolute; bottom:16px; right:16px;
    font-family:var(--mono); font-size:0.6rem; letter-spacing:0.12em; color:var(--stamp);
    border:1px solid var(--stamp); padding:3px 7px; border-radius:2px; transform:rotate(6deg); opacity:0.8;
  }

  section{padding:72px 0;}
  .section-head{max-width:640px; margin-bottom:36px;}
  .section-head .eyebrow{margin-bottom:16px;}
  .section-head h2{font-family:var(--display); font-weight:600; font-size:clamp(1.9rem, 3vw, 2.6rem); line-height:1.12; margin-bottom:16px;}
  .section-head p{color:var(--slate); font-size:1.02rem;}

  /* ---------- TRAINING & EXPERIENCE ---------- */
  .training{background:var(--paper);}
  .training .eyebrow{color:var(--stamp);} .training .eyebrow::before{color:var(--stamp);}
  .training-grid{display:grid; grid-template-columns:1.35fr 0.6fr; gap:56px; align-items:center;}
  .training-grid > div:first-child{padding-left:32px;}
  .stats-col{display:flex; flex-direction:column; gap:18px; align-items:flex-end; padding-right:44px;}
  .stat-circle{
    width:140px; height:140px; border-radius:50%; background:var(--ink);
    display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:16px;
    flex-shrink:0;
  }
  .stat-circle .num{font-family:var(--display); font-weight:700; font-size:1.5rem; color:var(--paper); line-height:1.1; margin-bottom:6px;}
  .stat-circle .label{font-family:var(--body); font-weight:500; font-size:0.68rem; color:var(--paper); opacity:0.85; text-transform:uppercase; letter-spacing:0.05em; line-height:1.3;}
  @media (max-width:800px){
    .training-grid{grid-template-columns:1fr; max-width:100%;}
    .training-grid > div:first-child{padding-left:0;}
    .stats-col{flex-direction:row; flex-wrap:wrap; justify-content:center; align-items:center; padding-right:0; gap:14px; margin-top:16px;}
    .stat-circle{width:100px; height:100px; padding:10px;}
    .stat-circle .num{font-size:1.1rem;}
    .stat-circle .label{font-size:0.56rem;}
  }
  .training h2{font-family:var(--display); font-weight:700; font-size:clamp(1.7rem,2.8vw,2.3rem); margin-bottom:24px; color:var(--ink);}
  .training ul{list-style:none;}
  .training li{font-size:0.98rem; color:#2c221c; padding:9px 0 9px 26px; position:relative; border-bottom:1px solid rgba(46,36,31,0.1);}
  .training li::before{content:"✓"; position:absolute; left:0; color:var(--accent); font-weight:700;}
  @media (max-width:800px){ .training-grid{grid-template-columns:1fr;} }

  /* video embed with overlaid caption */
  .video-callout{
    position:relative; margin-top:32px; border-radius:3px; overflow:hidden; border:1px solid var(--line);
    background:var(--ink); height:0; padding-bottom:56.25%;
  }
  .video-callout iframe{width:100%; height:100%; border:0; position:absolute; inset:0; z-index:0;}
  .video-callout::before{
    content:""; position:absolute; inset:0; z-index:1; pointer-events:none;
    background:linear-gradient(180deg, rgba(46,36,31,0.55) 0%, rgba(46,36,31,0) 30%, rgba(46,36,31,0) 70%, rgba(46,36,31,0.55) 100%);
  }
  .video-callout .cap-overlay{
    position:absolute; inset:0; z-index:2; padding:24px; cursor:pointer; transition:opacity .35s ease;
    display:flex; flex-direction:column; justify-content:center; align-items:center; gap:200px;
  }
  .video-callout .cap-line{
    font-family:var(--display); font-weight:800; text-transform:uppercase;
    font-size:clamp(1.9rem,5.6vw,3.6rem); color:var(--paper); line-height:1.05; max-width:18ch;
    text-align:center; text-shadow:0 3px 16px rgba(0,0,0,0.7);
  }
  .video-callout .cap-line .accent{color:var(--accent-bright);}
  @media (max-width:700px){ .video-callout .cap-overlay{gap:90px;} }
  @media (max-width:480px){
    .video-callout .cap-overlay{gap:40px; padding:16px;}
    .video-callout .cap-line{font-size:1.3rem;}
  }

  /* ---------- FIT SECTION ---------- */
  .fit{background:var(--ink-2); color:var(--paper); text-align:center; padding:52px 0;}
  .fit-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:28px; margin-top:30px;}
  .fit-card{padding:0 10px;}
  .fit-card .emoji{font-size:1.6rem; display:block; margin-bottom:12px;}
  .fit-card p{font-family:var(--display); font-weight:600; font-size:1.02rem; line-height:1.4; color:var(--paper);}
  @media (max-width:800px){ .fit-grid{grid-template-columns:1fr; gap:26px;} }

  /* ---------- BOOKING CARD ---------- */
  .book-card{
    margin-top:8px; border:1px solid var(--line); border-radius:4px; background:var(--paper-dim);
    padding:36px 32px; text-align:center;
  }
  .book-card h2{font-family:var(--display); font-weight:600; font-size:clamp(1.8rem,3vw,2.4rem); margin-bottom:16px;}
  .book-card p{color:var(--slate); max-width:44ch; margin:0 auto 30px;}

  /* ---------- CTA ---------- */
  .cta{text-align:center; background:radial-gradient(ellipse at 50% 0%, rgba(122,37,48,0.10), transparent 60%), var(--paper);}
  .cta h2{font-family:var(--display); font-weight:600; font-size:clamp(2rem,4vw,3rem); margin-bottom:20px; max-width:18ch; margin-inline:auto;}
  .cta p{color:var(--slate); max-width:44ch; margin:0 auto 36px;}

  footer{border-top:1px solid var(--line); padding:50px 0; background:var(--paper);}
  .foot-grid{display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:20px;}
  footer .brand{font-size:1rem;}
  .foot-links{display:flex; gap:26px; font-family:var(--mono); font-size:0.82rem; color:var(--slate);}
  .foot-links a:hover{color:var(--accent-bright);}
  .foot-note{font-family:var(--mono); font-size:0.72rem; color:#6b5d52; margin-top:26px;}
</style>
</head>
<body>

<header>
  <nav class="wrap">
    <div class="brand"><span class="mark">CBH</span> CLOSES</div>
    <a href="#book" class="nav-cta">Book a Call 📞</a>
  </nav>
</header>

<section class="hero">
  <div class="wrap hero-grid">
    <div>
      <div class="hero-tag">High Ticket Closer ⚡</div>
      <div class="name-display">Carolina Hojaij</div>
      <h1>10+ years of closing deals. Now doing it <em>remotely.</em></h1>
      <p class="lede" style="margin-bottom:26px;">Helping businesses, coaches, and missions sell offers that create real transformation for clients through high-converting conversations.</p>
      <div class="hero-actions">
        <a href="#book" class="btn-primary">Chat with Me →</a>
      </div>
    </div>
    <div class="photo-frame">
